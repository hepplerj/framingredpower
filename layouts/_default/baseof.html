<!DOCTYPE html>
<html lang="en">
{{ partial "head.html" . }}
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="mainBody">
    <header role="banner">
      {{ partial "header.html" . }}
    </header>

    <nav role="navigation" aria-label="Main navigation">
      {{ partial "navigation.html" . }}
    </nav>

    <main id="main-content" role="main">
      {{ block "main" . }}{{ end }}
    </main>

    <footer role="contentinfo">
      {{ partial "footer.html" . }}
    </footer>
  </div>
</body>
</html>
