{{ define "main" }}
<article id="content" lang="en">
<div class="bodyContent">

{{ partial "doc-nav.html" . }}

<header>
  <h1>{{ .Title }}</h1>
</header>

{{ .Content }}

<nav aria-label="Document navigation">
  <p><a href="{{ .Section | relURL }}">← Back to {{ .Section | humanize }}</a></p>
</nav>

</div>
</article>
{{ end }}
